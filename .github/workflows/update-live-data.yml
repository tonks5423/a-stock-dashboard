name: Update live A-share data

on:
  schedule:
    - cron: "30 3 * * 1-5"
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-cache:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: a_stock_dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch live data
        run: python scripts/update_live_cache.py
      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_cache
          if git diff --cached --quiet; then
            echo "No cache changes"
          else
            git commit -m "Update scheduled live market cache"
            git push
          fi
